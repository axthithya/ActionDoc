name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run mypy
        run: mypy src

      - name: Run tests
        run: pytest

  action-integration:
    name: Test local GitHub Action
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - id: clean
        name: Run local action on a clean fixture
        uses: ./
        with:
          path: tests/fixtures/repositories/multiple
          fail-on: high
          report-format: markdown
          report-path: ${{ runner.temp }}/actiondoc-clean.md

      - name: Verify clean report and step summary
        shell: bash
        run: |
          test -f "${{ steps.clean.outputs.report-path }}"
          grep -F "# ActionDoc Report" "$GITHUB_STEP_SUMMARY"

      - id: finding
        name: Run local action on a failing fixture
        # Intentional: verifies that a finding exit code remains observable.
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/repositories/rules_high
          fail-on: high
          report-format: json
          report-path: ${{ runner.temp }}/actiondoc-finding.json

      - name: Verify expected failing result and report
        shell: bash
        run: |
          test "${{ steps.finding.outcome }}" = "failure"
          test -f "${{ steps.finding.outputs.report-path }}"
