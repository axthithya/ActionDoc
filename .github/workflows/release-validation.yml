name: Release validation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run quality checks
        run: |
          ruff check .
          ruff format --check .
          mypy src
          pytest

      - name: Run release self-audit
        run: actiondoctor scan . --fail-on high --no-color

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-test the wheel in a clean environment
        shell: bash
        run: |
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/*.whl
          .release-venv/bin/actiondoctor --help
          .release-venv/bin/actiondoctor version
          .release-venv/bin/actiondoctor scan --help

      - name: Upload release distributions
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: actiondoctor-distributions-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
