name: Bug report
description: Report a reproducible ActionDoc problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove secrets, tokens, private repository names, and active vulnerability details.
  - type: input
    id: actiondoc-version
    attributes:
      label: ActionDoc version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "Python 3.12.0"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: actiondoctor scan . --fail-on high
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Minimal workflow example
      description: Provide a sanitized YAML example that reproduces the problem.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
